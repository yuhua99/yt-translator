<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Translator Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Simple Translator</h1>

      <section>
        <h2>Provider</h2>
        <label>
          Active provider
          <select id="provider-type">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic Claude</option>
            <option value="opencodeZen">opencode Zen</option>
          </select>
        </label>
        <label>
          API key
          <input id="provider-api-key" type="password" autocomplete="off" />
        </label>
        <label>
          Model
          <select id="provider-model-preset"></select>
        </label>
        <label id="custom-model-row" hidden>
          Custom model
          <input id="provider-model" type="text" placeholder="Model id" />
        </label>
        <button id="test-provider" type="button">Test active provider</button>
      </section>

      <section>
        <h2>Translation</h2>
        <label>
          Target language
          <select id="target-language">
            <option value="zh-TW">繁體中文</option>
            <option value="zh-CN">简体中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
          </select>
        </label>
      </section>

      <button id="save" type="button">Save</button>
      <p id="status" role="status"></p>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
